  <!-- Flame outer -->
  <path d="M16 5 C13.5 8.5 12 11 12.5 13.5 C13 16 19 16 19.5 13.5 C20 11 18.5 8.5 16 5Z" fill="#f59e0b" opacity="0.9"/>
  <!-- Flame inner highlight -->
